<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neptune Tech Inc.</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --neptune-blue: #1a6fb0;
            --neptune-deep: #0a1628;
            --neptune-glow: #4db8ff;
            --nebula-purple: #2d1b69;
            --nebula-pink: #8b1a6b;
            --star-white: #e8f4ff;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            overscroll-behavior: none;
            cursor: crosshair;
        }

        /* ── CANVAS STARFIELD ── */
        #starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* ── SHARED FIXED SCENE ── */
        .fixed-scene {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; pointer-events: none;
        }

        /* ══════════════════════════════════
           SECTION 1 — HERO
        ══════════════════════════════════ */
        .hero-scene { z-index: 10; }

        .nebula-layer {
            position: absolute; width: 100%; height: 100%;
            opacity: 0;
        }
        .nebula-1 {
            background:
                radial-gradient(ellipse 60% 40% at 20% 60%, rgba(45,27,105,0.7) 0%, transparent 70%),
                radial-gradient(ellipse 50% 35% at 80% 30%, rgba(139,26,107,0.4) 0%, transparent 65%),
                radial-gradient(ellipse 70% 50% at 50% 80%, rgba(10,22,40,0.9) 0%, transparent 60%);
            z-index: 2;
        }
        .nebula-2 {
            background:
                radial-gradient(ellipse 40% 60% at 75% 70%, rgba(26,111,176,0.35) 0%, transparent 70%),
                radial-gradient(ellipse 55% 30% at 10% 20%, rgba(77,184,255,0.15) 0%, transparent 60%);
            z-index: 3;
        }

        .hero-planet {
            position: absolute;
            width: 65vw; height: 65vw;
            max-width: 850px; max-height: 850px;
            bottom: -55vh;
            border-radius: 50%;
            background:
                radial-gradient(ellipse 80% 60% at 35% 40%, rgba(100,180,255,0.6) 0%, transparent 50%),
                radial-gradient(ellipse 100% 30% at 50% 70%, rgba(26,70,140,0.8) 0%, transparent 50%),
                radial-gradient(ellipse 60% 80% at 70% 30%, rgba(10,30,80,0.9) 0%, transparent 60%),
                linear-gradient(160deg,
                    #3a8fd4 0%, #1e5fa0 15%, #0d3d7a 30%,
                    #1a6fb0 45%, #0a2a5e 60%, #163d7a 75%, #0d2d5a 100%
                );
            box-shadow:
                inset -60px -60px 200px rgba(0,0,0,0.97),
                inset 30px 30px 120px rgba(77,184,255,0.15),
                0 0 120px rgba(26,111,176,0.3),
                0 0 250px rgba(10,22,40,0.8);
            opacity: 0;
            z-index: 5;
            overflow: hidden;
        }
        .hero-planet::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            background:
                repeating-linear-gradient(
                    175deg,
                    transparent 0px, transparent 18px,
                    rgba(100,170,255,0.06) 18px, rgba(100,170,255,0.06) 20px,
                    transparent 20px, transparent 42px,
                    rgba(40,100,200,0.05) 42px, rgba(40,100,200,0.05) 45px
                );
        }

        .hero-ring {
            position: absolute;
            width: 100vw; height: 25vw;
            max-width: 1300px; max-height: 330px;
            bottom: -10vh;
            border-radius: 50%;
            border: 2px solid rgba(77,184,255,0.15);
            box-shadow: 0 0 30px rgba(77,184,255,0.08), inset 0 0 20px rgba(77,184,255,0.05);
            opacity: 0;
            z-index: 4;
            transform: rotateX(80deg);
        }

        .hero-glow {
            position: absolute;
            width: 80vw; height: 30vw;
            bottom: -15vh;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(26,111,176,0.5) 0%, rgba(10,22,40,0.2) 50%, transparent 75%);
            filter: blur(40px);
            opacity: 0;
            z-index: 4;
        }

        .hero-content {
            position: relative; z-index: 10;
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }
        .hero-eyebrow {
            font-family: 'Orbitron', monospace;
            font-size: clamp(9px, 1vw, 13px);
            font-weight: 400;
            letter-spacing: 0.5em;
            color: rgba(77,184,255,0.7);
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
        }
        .hero-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(32px, 7vw, 110px);
            font-weight: 900;
            letter-spacing: 0.08em;
            line-height: 0.9;
            background: linear-gradient(180deg, #ffffff 0%, #a8d4ff 40%, #4db8ff 70%, #1a6fb0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(77,184,255,0.4));
            opacity: 0;
        }
        .hero-subtitle {
            font-size: clamp(12px, 1.4vw, 18px);
            font-weight: 300;
            letter-spacing: 0.35em;
            color: rgba(168,212,255,0.55);
            margin-top: 1.8rem;
            opacity: 0;
            transform: translateY(15px);
        }
        .hero-line {
            width: 1px; height: 60px;
            background: linear-gradient(to bottom, transparent, rgba(77,184,255,0.6), transparent);
            margin: 1.5rem auto;
            opacity: 0;
        }

        /* ══════════════════════════════════
           SECTION 3 — PORTAL / ASTRONAUT
        ══════════════════════════════════ */
        .portal-scene { z-index: 20; }
        .portal-mask {
            position: absolute; width: 100%; height: 100%;
            clip-path: circle(0% at 50% 50%);
            background: var(--neptune-deep);
            display: flex; align-items: center; justify-content: center;
        }
        .portal-bg {
            position: absolute; width: 110%; height: 110%;
            z-index: 21;
            background:
                radial-gradient(ellipse 70% 50% at 30% 40%, rgba(45,27,105,0.6) 0%, transparent 60%),
                radial-gradient(ellipse 50% 70% at 80% 70%, rgba(10,22,40,0.95) 0%, transparent 50%),
                radial-gradient(ellipse 100% 60% at 50% 100%, rgba(26,111,176,0.2) 0%, transparent 55%),
                #000510;
        }
        .portal-distant-planet {
            position: absolute;
            left: 8%; top: 15%;
            width: 18vw; height: 18vw;
            max-width: 220px; max-height: 220px;
            border-radius: 50%;
            background:
                radial-gradient(ellipse 70% 60% at 40% 35%, rgba(90,160,240,0.5) 0%, transparent 55%),
                linear-gradient(135deg, #2a5f9e 0%, #0d2d5a 50%, #071828 100%);
            box-shadow: inset -20px -20px 60px rgba(0,0,0,0.9), 0 0 50px rgba(26,111,176,0.2);
            z-index: 22;
            opacity: 0.7;
        }
        .astronaut {
            position: absolute; right: 12%; top: 18%;
            width: 32vw; max-width: 420px;
            z-index: 25;
            transform-origin: center center;
            filter:
                drop-shadow(0 0 40px rgba(77,184,255,0.25))
                drop-shadow(0 20px 40px rgba(0,0,0,0.9));
        }
        .hud-corner {
            position: absolute; z-index: 27;
            width: 80px; height: 80px;
            border-color: rgba(77,184,255,0.3);
            border-style: solid;
            opacity: 0;
        }
        .hud-tl { top: 5%; left: 5%; border-width: 2px 0 0 2px; }
        .hud-tr { top: 5%; right: 5%; border-width: 2px 2px 0 0; }
        .hud-bl { bottom: 5%; left: 5%; border-width: 0 0 2px 2px; }
        .hud-br { bottom: 5%; right: 5%; border-width: 0 2px 2px 0; }

        .portal-text {
            position: absolute; left: 8%; top: 50%;
            transform: translateY(-50%);
            z-index: 26; opacity: 0;
        }
        .portal-text .label {
            font-family: 'Orbitron', monospace;
            font-size: clamp(8px, 0.8vw, 11px);
            letter-spacing: 0.4em;
            color: rgba(77,184,255,0.5);
            margin-bottom: 0.8rem;
        }
        .portal-text .heading {
            font-family: 'Orbitron', monospace;
            font-size: clamp(18px, 3vw, 46px);
            font-weight: 700;
            line-height: 1.1;
            background: linear-gradient(135deg, #fff 0%, #4db8ff 60%, #1a6fb0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .portal-text .sub {
            font-size: clamp(11px, 1.1vw, 15px);
            font-weight: 300;
            color: rgba(168,212,255,0.5);
            letter-spacing: 0.2em;
            margin-top: 1rem;
        }
        .white-glow-overlay {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #ffffff 0%, #c8e8ff 40%, #1a6fb0 80%, #000 100%);
            z-index: 28; opacity: 1;
        }

        /* ══════════════════════════════════
           SECTION 5 — FINAL
        ══════════════════════════════════ */
        .final-scene { z-index: 30; opacity: 0; background: #000; }
        .final-galaxy {
            position: absolute; width: 130%; height: 130%;
            background:
                radial-gradient(ellipse 80% 60% at 50% 50%, rgba(45,27,105,0.5) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 20% 70%, rgba(139,26,107,0.3) 0%, transparent 55%),
                radial-gradient(ellipse 40% 60% at 80% 20%, rgba(26,111,176,0.3) 0%, transparent 50%),
                radial-gradient(ellipse 100% 100% at 50% 50%, #050010 0%, #000 70%);
            z-index: 31;
        }
        .final-galaxy::after {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 200% 20% at 50% 60%, rgba(100,80,200,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 200% 15% at 50% 55%, rgba(77,184,255,0.08) 0%, transparent 50%);
            transform: rotate(-15deg);
        }
        .final-content {
            position: relative; z-index: 35;
            text-align: center; opacity: 0;
            transform: translateY(60px);
        }
        .final-tag {
            font-family: 'Orbitron', monospace;
            font-size: clamp(8px, 0.9vw, 12px);
            letter-spacing: 0.5em;
            color: rgba(77,184,255,0.5);
            margin-bottom: 1.5rem;
        }
        .final-text {
            font-family: 'Orbitron', monospace;
            font-size: clamp(20px, 4vw, 60px);
            font-weight: 700;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, #ffffff 0%, #a8d4ff 50%, #4db8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(77,184,255,0.3));
            line-height: 1.2;
        }
        .final-divider {
            width: 120px; height: 1px;
            background: linear-gradient(to right, transparent, rgba(77,184,255,0.5), transparent);
            margin: 2rem auto;
        }
        .final-cta {
            font-size: clamp(11px, 1.1vw, 14px);
            font-weight: 300;
            letter-spacing: 0.4em;
            color: rgba(168,212,255,0.45);
        }

        /* ── SCROLL TRACK ── */
        .scroll-track { position: relative; z-index: 1; }
        .scroll-section { width: 100%; }
        .s1-hero   { height: 280vh; }
        .s2-dark   { height: 150vh; }
        .s3-portal { height: 380vh; }
        .s4-final  { height: 220vh; }

        /* ── SCROLL HINT ── */
        .scroll-hint {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            transition: opacity 0.5s;
        }
        .scroll-hint span {
            font-family: 'Orbitron', monospace;
            font-size: 9px; letter-spacing: 0.4em;
            color: rgba(77,184,255,0.4);
        }
        .scroll-hint .arrow {
            width: 1px; height: 50px;
            background: linear-gradient(to bottom, rgba(77,184,255,0.5), transparent);
            animation: pulse-down 1.8s ease-in-out infinite;
        }
        @keyframes pulse-down {
            0%, 100% { transform: scaleY(1); opacity: 0.5; }
            50%       { transform: scaleY(1.3); opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div id="root"></div>

    <script>
        (function () {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let W, H, stars = [], shootingStars = [];

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }

            function createStars() {
                stars = [];
                const count = Math.floor((W * H) / 1200);
                for (let i = 0; i < count; i++) {
                    const size = Math.random();
                    stars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: size < 0.7 ? 0.4 : size < 0.9 ? 0.8 : 1.3,
                        alpha: 0.3 + Math.random() * 0.7,
                        twinkleSpeed: 0.005 + Math.random() * 0.015,
                        twinklePhase: Math.random() * Math.PI * 2,
                        hue: Math.random() < 0.15 ? 210 + Math.random() * 40 : 0,
                        sat: Math.random() < 0.15 ? 60 : 0,
                    });
                }
            }

            function spawnShootingStar() {
                shootingStars.push({
                    x: Math.random() * W * 0.7,
                    y: Math.random() * H * 0.4,
                    vx: 6 + Math.random() * 8,
                    vy: 3 + Math.random() * 5,
                    len: 120 + Math.random() * 180,
                    life: 1,
                });
            }

            let frame = 0;
            function draw() {
                ctx.clearRect(0, 0, W, H);
                frame++;
                if (frame % 280 === 0 && Math.random() < 0.6) spawnShootingStar();

                for (const s of stars) {
                    s.twinklePhase += s.twinkleSpeed;
                    const alpha = s.alpha * (0.6 + 0.4 * Math.sin(s.twinklePhase));
                    ctx.fillStyle = s.hue
                        ? `hsla(${s.hue},${s.sat}%,90%,${alpha})`
                        : `rgba(232,244,255,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                    if (s.r > 1) {
                        ctx.fillStyle = `rgba(77,184,255,${alpha * 0.15})`;
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                for (let i = shootingStars.length - 1; i >= 0; i--) {
                    const ss = shootingStars[i];
                    ss.x += ss.vx; ss.y += ss.vy;
                    ss.life -= 0.025;
                    if (ss.life <= 0) { shootingStars.splice(i, 1); continue; }
                    const mag = Math.sqrt(ss.vx * ss.vx + ss.vy * ss.vy);
                    const grad = ctx.createLinearGradient(
                        ss.x, ss.y,
                        ss.x - (ss.vx / mag) * ss.len,
                        ss.y - (ss.vy / mag) * ss.len
                    );
                    grad.addColorStop(0, `rgba(255,255,255,${ss.life})`);
                    grad.addColorStop(0.3, `rgba(168,212,255,${ss.life * 0.5})`);
                    grad.addColorStop(1, 'rgba(77,184,255,0)');
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(ss.x, ss.y);
                    ctx.lineTo(ss.x - (ss.vx / mag) * ss.len, ss.y - (ss.vy / mag) * ss.len);
                    ctx.stroke();
                }

                requestAnimationFrame(draw);
            }

            resize(); createStars(); draw();
            window.addEventListener('resize', () => { resize(); createStars(); });
        })();
    </script>

    <script type="text/babel">
        const { useLayoutEffect, useRef } = React;
        gsap.registerPlugin(ScrollTrigger);

        function App() {
            const containerRef = useRef(null);

            useLayoutEffect(() => {
                const lenis = new Lenis({
                    duration: 1.6,
                    easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                    direction: 'vertical',
                    smooth: true,
                });
                function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
                requestAnimationFrame(raf);

                lenis.on('scroll', ({ scroll }) => {
                    const hint = document.querySelector('.scroll-hint');
                    if (hint) hint.style.opacity = scroll > 80 ? '0' : '1';
                });

                let ctx = gsap.context(() => {

                    // Entrance animation (no scroll)
                    gsap.timeline({ delay: 0.4 })
                        .to('.hero-eyebrow',  { opacity: 1, y: 0, duration: 1, ease: 'power3.out' })
                        .to('.hero-title',    { opacity: 1, duration: 1.2, ease: 'power2.out' }, '-=0.5')
                        .to('.hero-line',     { opacity: 1, duration: 0.8 }, '-=0.4')
                        .to('.hero-subtitle', { opacity: 1, y: 0, duration: 1, ease: 'power3.out' }, '-=0.4');

                    // Section 1 — Neptune rise
                    gsap.timeline({
                        scrollTrigger: { trigger: '.s1-hero', start: 'top top', end: 'bottom top', scrub: 1.2 }
                    })
                        .to('.nebula-1',     { opacity: 1, duration: 3 }, 0)
                        .to('.nebula-2',     { opacity: 1, duration: 2 }, 0.5)
                        .to('.hero-glow',    { opacity: 1, duration: 3 }, 0.5)
                        .to('.hero-ring',    { opacity: 1, duration: 2 }, 1)
                        .to('.hero-planet',  { opacity: 1, bottom: '-8vh', duration: 3.5, ease: 'power1.out' }, 0.8)
                        .to('.hero-content', { opacity: 0, y: -60, duration: 1.5 }, 2);

                    // Section 2 — Fade to black
                    gsap.timeline({
                        scrollTrigger: { trigger: '.s2-dark', start: 'top top', end: 'bottom top', scrub: 1 }
                    }).to('.hero-scene', { opacity: 0, duration: 1 });

                    // Section 3 — Portal
                    gsap.set('.portal-bg',          { scale: 1.3 });
                    gsap.set('.astronaut',           { scale: 0.75, y: 180, x: -60, rotation: -12, opacity: 0 });
                    gsap.set('.white-glow-overlay',  { opacity: 1 });
                    gsap.set('.hud-corner',          { opacity: 0 });
                    gsap.set('.portal-text',         { opacity: 0, x: -40 });

                    gsap.timeline({
                        scrollTrigger: { trigger: '.s3-portal', start: 'top top', end: 'bottom top', scrub: 1.5 }
                    })
                        .to('.portal-mask',        { clipPath: 'circle(150% at 50% 50%)', duration: 5, ease: 'power2.inOut' }, 0)
                        .to('.white-glow-overlay',  { opacity: 0, duration: 2 }, 1.5)
                        .to('.portal-bg',           { scale: 1, y: '-5%', duration: 5 }, 0)
                        .to('.astronaut',           { scale: 1.05, y: -40, x: 15, rotation: 4, opacity: 1, duration: 4.5 }, 1)
                        .to('.hud-corner',          { opacity: 1, duration: 1.5, stagger: 0.2 }, 2.5)
                        .to('.portal-text',         { opacity: 1, x: 0, duration: 2 }, 2.8);

                    // Section 4 → Final
                    gsap.timeline({
                        scrollTrigger: { trigger: '.s4-final', start: 'top top', end: 'bottom top', scrub: 1 }
                    })
                        .to('.portal-scene',  { opacity: 0, duration: 1.5 }, 0)
                        .to('.final-scene',   { opacity: 1, duration: 1.2 }, 0.3)
                        .to('.final-galaxy',  { scale: 1.08, duration: 4 }, 0)
                        .to('.final-content', { opacity: 1, y: 0, duration: 2 }, 1.2);

                }, containerRef);

                return () => { ctx.revert(); lenis.destroy(); };
            }, []);

            return (
                <div ref={containerRef}>

                    {/* HERO */}
                    <div className="fixed-scene hero-scene">
                        <div className="nebula-layer nebula-1"></div>
                        <div className="nebula-layer nebula-2"></div>
                        <div className="hero-glow"></div>
                        <div className="hero-ring"></div>
                        <div className="hero-planet"></div>
                        <div className="hero-content">
                            <p className="hero-eyebrow">EST. 2024 · DIVISION VII · DEEP SPACE</p>
                            <h1 className="hero-title">NEPTUNE<br/>TECH INC.</h1>
                            <div className="hero-line"></div>
                            <p className="hero-subtitle">Beyond the Known Frontier</p>
                        </div>
                    </div>

                    {/* PORTAL / ASTRONAUT */}
                    <div className="fixed-scene portal-scene">
                        <div className="portal-mask">
                            <div className="white-glow-overlay"></div>
                            <div className="portal-bg"></div>
                            <div className="portal-distant-planet"></div>
                            <img src="./astronaut.png" alt="Astronaut" className="astronaut" />
                            <div className="hud-corner hud-tl"></div>
                            <div className="hud-corner hud-tr"></div>
                            <div className="hud-corner hud-bl"></div>
                            <div className="hud-corner hud-br"></div>
                            <div className="portal-text">
                                <p className="label">MISSION BRIEFING</p>
                                <h2 className="heading">WE BUILD<br/>WHAT OTHERS<br/>ONLY IMAGINE</h2>
                                <p className="sub">Advanced Systems · Deep Space R&amp;D</p>
                            </div>
                        </div>
                    </div>

                    {/* FINAL */}
                    <div className="fixed-scene final-scene">
                        <div className="final-galaxy"></div>
                        <div className="final-content">
                            <p className="final-tag">NEPTUNE TECH INC.</p>
                            <h2 className="final-text">Exploring Beyond<br/>All Boundaries</h2>
                            <div className="final-divider"></div>
                            <p className="final-cta">The universe is just the beginning</p>
                        </div>
                    </div>

                    {/* SCROLL TRACK */}
                    <div className="scroll-track">
                        <div className="scroll-section s1-hero"></div>
                        <div className="scroll-section s2-dark"></div>
                        <div className="scroll-section s3-portal"></div>
                        <div className="scroll-section s4-final"></div>
                    </div>

                    {/* SCROLL HINT */}
                    <div className="scroll-hint">
                        <span>SCROLL</span>
                        <div className="arrow"></div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
