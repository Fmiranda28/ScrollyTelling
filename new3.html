<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neptune Tech Inc.</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; overflow-x: hidden; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  .hero-spacer {
    height: 300vh;
    position: relative;
  }

  .hero {
    position: sticky;
    top: 0;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .arc-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .arc-svg {
    width: 100%; height: 100%;
    overflow: visible;
  }

  .logo-wrap {
    position: relative;
    z-index: 10;
    text-align: center;
    user-select: none;
  }

  .logo-eyebrow {
    display: block;
    font-size: clamp(9px, 1.2vw, 13px);
    letter-spacing: 0.45em;
    color: rgba(255,255,255,0.28);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .logo-main {
    display: block;
    font-size: clamp(28px, 6vw, 88px);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    line-height: 1;
  }

  .logo-sub {
    display: block;
    font-size: clamp(9px, 1.2vw, 14px);
    letter-spacing: 0.6em;
    color: rgba(255,255,255,0.22);
    text-transform: uppercase;
    margin-top: 20px;
  }

  .scroll-hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .scroll-hint span {
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  .scroll-hint-line {
    width: 1px;
    height: 36px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
    animation: lineAnim 2s ease-in-out infinite;
  }

  @keyframes lineAnim {
    0%   { transform: scaleY(0); transform-origin: top; opacity: 1; }
    50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
    100% { transform: scaleY(1); transform-origin: bottom; opacity: 0; }
  }

  .content-section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
    max-width: 900px;
    margin: 0 auto;
  }

  .tagline {
    font-size: clamp(22px, 4vw, 52px);
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1.3;
    text-align: center;
    color: rgba(255,255,255,0.85);
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .tagline.visible { opacity: 1; transform: translateY(0); }
  .tagline em { font-style: normal; color: #a8d0f0; }

  .divider {
    width: 1px; height: 60px;
    background: linear-gradient(to bottom, rgba(168,208,240,0.4), transparent);
    margin: 48px auto;
    opacity: 0;
    transition: opacity 1.2s ease 0.3s;
  }
  .divider.visible { opacity: 1; }

  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.9s ease 0.5s, transform 0.9s ease 0.5s;
  }
  .pills.visible { opacity: 1; transform: translateY(0); }

  .pill {
    border: 1px solid rgba(168,208,240,0.18);
    border-radius: 100px;
    padding: 10px 24px;
    font-size: clamp(10px, 1.2vw, 12px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  .footer-section {
    min-height: 30vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }

  .footer-text {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
    text-align: center;
  }
</style>
</head>
<body>

<div class="hero-spacer">
  <div class="hero">
    <div class="arc-container">
      <svg class="arc-svg" id="arcSvg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
        <defs>
          <filter id="f-trail" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="10" result="b1"/>
            <feGaussianBlur stdDeviation="3"  result="b2"/>
            <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/></feMerge>
          </filter>
          <filter id="f-dot" x="-300%" y="-300%" width="700%" height="700%">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="f-rim" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="22" result="b1"/>
            <feGaussianBlur stdDeviation="7"  result="b2"/>
            <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/></feMerge>
          </filter>

          <linearGradient id="g-trail" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1000" y2="0">
            <stop offset="0%"   stop-color="#3a7fc1" stop-opacity="0.7"/>
            <stop offset="30%"  stop-color="#88c4f0" stop-opacity="0.9"/>
            <stop offset="55%"  stop-color="#ffffff" stop-opacity="1"/>
            <stop offset="75%"  stop-color="#e8c878" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#c88030" stop-opacity="0.3"/>
          </linearGradient>

          <linearGradient id="g-rim" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1000" y2="0">
            <stop offset="0%"   stop-color="#2a6fb1" stop-opacity="0.2"/>
            <stop offset="30%"  stop-color="#78b8e8" stop-opacity="0.55"/>
            <stop offset="55%"  stop-color="#dff0ff" stop-opacity="0.7"/>
            <stop offset="75%"  stop-color="#e0b860" stop-opacity="0.45"/>
            <stop offset="100%" stop-color="#b07020" stop-opacity="0.1"/>
          </linearGradient>

          <radialGradient id="g-dot" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
            <stop offset="40%"  stop-color="#b0d8ff" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#4090d0" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Arc: bottom-left → peak near top-center → bottom-right, fully within viewBox -->
        <path id="arcPath"
              d="M 0,590 Q 500,20 1000,590"
              fill="none" stroke="none"/>

        <!-- Atmospheric rim (revealed after dot completes) -->
        <path id="arc-rim"
              d="M 0,590 Q 500,20 1000,590"
              fill="none"
              stroke="url(#g-rim)"
              stroke-width="2.5"
              filter="url(#f-rim)"
              opacity="0"/>

        <!-- Growing trail -->
        <path id="arc-trail"
              d="M 0,590 Q 500,20 1000,590"
              fill="none"
              stroke="url(#g-trail)"
              stroke-width="1.8"
              filter="url(#f-trail)"
              stroke-dasharray="0 3000"
              opacity="0"/>

        <!-- Dot -->
        <g id="dot-group" opacity="0">
          <circle r="30" fill="url(#g-dot)" opacity="0.4" filter="url(#f-trail)"/>
          <circle r="3.5" fill="#ffffff" filter="url(#f-dot)"/>
        </g>
      </svg>
    </div>

    <div class="logo-wrap">
      <span class="logo-eyebrow">Est. 2019 · Deep Space Technology</span>
      <span class="logo-main">Neptune Tech Inc.</span>
      <span class="logo-sub">Beyond the known horizon</span>
    </div>

    <div class="scroll-hint" id="scrollHint">
      <span>Scroll</span>
      <div class="scroll-hint-line"></div>
    </div>
  </div>
</div>

<section class="content-section">
  <p class="tagline">We build <em>infrastructure</em> for<br>the next frontier of computing.</p>
  <div class="divider"></div>
  <div class="pills">
    <span class="pill">Deep Learning Systems</span>
    <span class="pill">Orbital Data Networks</span>
    <span class="pill">Quantum Architecture</span>
    <span class="pill">Edge Intelligence</span>
  </div>
</section>

<footer class="footer-section">
  <p class="footer-text">© 2026 Neptune Tech Inc. — All systems nominal.</p>
</footer>

<script>
gsap.registerPlugin(MotionPathPlugin, ScrollTrigger);

const arcPath    = document.getElementById('arcPath');
const dotGroup   = document.getElementById('dot-group');
const arcTrail   = document.getElementById('arc-trail');
const arcRim     = document.getElementById('arc-rim');
const scrollHint = document.getElementById('scrollHint');

const pathLength = arcPath.getTotalLength();
arcTrail.setAttribute('stroke-dasharray', `0 ${pathLength}`);

// Paused timeline driven entirely by scroll progress
const tl = gsap.timeline({ paused: true });

tl.to(dotGroup, { opacity: 1, duration: 0.05 }, 0);
tl.to(arcTrail, { opacity: 1, duration: 0.05 }, 0);

tl.to(dotGroup, {
  motionPath: {
    path: '#arcPath',
    align: '#arcPath',
    alignOrigin: [0.5, 0.5],
    autoRotate: false,
    start: 0,
    end: 1
  },
  duration: 0.80,
  ease: 'power1.inOut',
  onUpdate() {
    const p = this.progress();
    const drawn = p * pathLength;
    arcTrail.setAttribute('stroke-dasharray', `${drawn} ${pathLength - drawn}`);
  }
}, 0);

tl.to(arcRim,   { opacity: 1,    duration: 0.20, ease: 'power2.out' }, 0.78);
tl.to(dotGroup, { opacity: 0,    duration: 0.12 }, 0.88);
tl.to(arcTrail, { opacity: 0.40, duration: 0.12 }, 0.88);

// Scrub the timeline through the 300vh spacer
ScrollTrigger.create({
  trigger: '.hero-spacer',
  start: 'top top',
  end: 'bottom bottom',
  scrub: 1.2,
  onUpdate(self) {
    tl.progress(self.progress);
  }
});

// Fade scroll hint
window.addEventListener('scroll', () => {
  scrollHint.style.opacity = window.scrollY > 60 ? '0' : '1';
}, { passive: true });

// Reveal content below
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.25 });

document.querySelectorAll('.tagline, .divider, .pills').forEach(el => obs.observe(el));
</script>
</body>
</html>
